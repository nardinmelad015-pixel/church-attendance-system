<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تقديم اعتذار</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>تقديم اعتذار</h2>

<p>
الاجتماع:
<strong>{{ schedule.meeting }}</strong>
</p>

<form method="POST">

    {% csrf_token %}

    <label class="form-label">
        سبب الاعتذار
    </label>

    <textarea
        name="reason"
        class="form-control"
        rows="5"
        required
    ></textarea>

    <br>

    <button
        type="submit"
        class="btn btn-warning"
    >
        إرسال الاعتذار
    </button>

</form>

</body>
</html>
