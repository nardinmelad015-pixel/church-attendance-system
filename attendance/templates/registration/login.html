
{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*, *::before, *::after {
    font-family: "Cairo", sans-serif;
    box-sizing: border-box;
}

/* ===== BACKGROUND SCENE ===== */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg,
        #020818 0%,
        #0a1628 45%,
        #1a2a4a 75%,
        #1f3a6e 100%
    );
    overflow: hidden;
    position: relative;
}

/* Stars */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1.5px 1.5px at 12% 8%,  rgba(255,255,255,.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 25% 15%, rgba(255,255,230,.7)  0%, transparent 100%),
        radial-gradient(2px   2px   at 38% 5%,  rgba(255,255,255,.9)  0%, transparent 100%),
        radial-gradient(1px   1px   at 55% 12%, rgba(200,230,255,.8)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 70% 7%,  rgba(255,255,255,.75) 0%, transparent 100%),
        radial-gradient(1px   1px   at 82% 18%, rgba(255,240,200,.8)  0%, transparent 100%),
        radial-gradient(2px   2px   at 92% 9%,  rgba(255,255,255,.9)  0%, transparent 100%),
        radial-gradient(1px   1px   at 6%  22%, rgba(255,255,255,.6)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 18% 30%, rgba(200,220,255,.7)  0%, transparent 100%),
        radial-gradient(1px   1px   at 45% 25%, rgba(255,255,255,.8)  0%, transparent 100%),
        radial-gradient(1px   1px   at 63% 20%, rgba(255,255,200,.65) 0%, transparent 100%),
        radial-gradient(2px   2px   at 78% 28%, rgba(255,255,255,.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 88% 33%, rgba(200,230,255,.7)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 32% 38%, rgba(255,255,255,.6)  0%, transparent 100%),
        radial-gradient(1px   1px   at 50% 42%, rgba(255,240,180,.75) 0%, transparent 100%),
        radial-gradient(1px   1px   at 15% 45%, rgba(255,255,255,.55) 0%, transparent 100%),
        radial-gradient(2px   2px   at 96% 40%, rgba(255,255,255,.8)  0%, transparent 100%),
        radial-gradient(1px   1px   at 4%  50%, rgba(200,230,255,.6)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 72% 48%, rgba(255,255,255,.7)  0%, transparent 100%),
        radial-gradient(1px   1px   at 58% 55%, rgba(255,255,200,.6)  0%, transparent 100%);
    pointer-events: none;
    animation: starTwinkle 6s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes starTwinkle {
    0%   { opacity: .7; }
    50%  { opacity: 1;  }
    100% { opacity: .5; }
}

/* Moon decoration */
body::after {
    content: "";
    position: fixed;
    top: 6%;
    right: 8%;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f5d060 60%, #d4a843);
    box-shadow:
        0 0 25px 8px  rgba(255,230,100,.35),
        0 0 70px 25px rgba(255,210,70,.15);
    pointer-events: none;
    z-index: 0;
    animation: moonFloat 8s ease-in-out infinite;
}

@keyframes moonFloat {
    0%, 100% { transform: translateY(0);   }
    50%       { transform: translateY(-7px);}
}

/* Church silhouette at the bottom */
.church-silhouette {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    gap: 0;
    filter: drop-shadow(0 -6px 24px rgba(0,0,0,.6));
}

/* Towers */
.sil-tower {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 55px;
}

.sil-steeple {
    width: 0; height: 0;
    border-left:  13px solid transparent;
    border-right: 13px solid transparent;
    border-bottom: 38px solid #0d1525;
}

.sil-cross {
    width: 14px; height: 20px;
    position: relative;
    margin-bottom: -3px;
    z-index: 2;
}
.sil-cross::before {
    content: "";
    position: absolute;
    left: 50%; top: 0;
    transform: translateX(-50%);
    width: 2px; height: 100%;
    background: #d4a843;
    box-shadow: 0 0 5px #d4a843;
}
.sil-cross::after {
    content: "";
    position: absolute;
    left: 0; top: 35%;
    width: 100%; height: 2px;
    background: #d4a843;
    box-shadow: 0 0 5px #d4a843;
}

.sil-tower-body {
    width: 52px;
    height: 90px;
    background: #0d1525;
    border-radius: 2px 2px 0 0;
    position: relative;
}

.sil-tower-win {
    position: absolute;
    top: 22px;
    left: 50%; transform: translateX(-50%);
    width: 20px; height: 28px;
    border-radius: 50% 50% 0 0 / 80% 80% 0 0;
    background: rgba(255,220,100,.8);
    box-shadow: 0 0 12px 3px rgba(255,220,100,.6);
    animation: winBlink 4s ease-in-out infinite;
}

.sil-tower-win.delay1 { animation-delay: -2s; }
.sil-tower-win.delay2 { animation-delay: -1s; }

@keyframes winBlink {
    0%,100% { opacity: 1; }
    48%     { opacity: .7; }
    50%     { opacity: .1; }
    52%     { opacity: .7; }
}

/* Main body */
.sil-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 160px;
}

.sil-roof {
    width: 0; height: 0;
    border-left:  90px solid transparent;
    border-right: 90px solid transparent;
    border-bottom: 55px solid #0d1525;
}

.sil-facade {
    width: 160px;
    height: 140px;
    background: #0d1525;
    position: relative;
    border-radius: 2px 2px 0 0;
}

/* Rose window */
.sil-rose {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid #d4a843;
    background: rgba(255,220,100,.25);
    box-shadow: 0 0 10px rgba(212,168,67,.5);
    animation: roseGlow 3s ease-in-out infinite;
}

@keyframes roseGlow {
    0%,100% { box-shadow: 0 0 10px rgba(212,168,67,.5); }
    50%      { box-shadow: 0 0 20px rgba(212,168,67,.9); }
}

/* Facade windows */
.sil-wins {
    position: absolute;
    bottom: 55px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
}

.sil-win {
    width: 22px; height: 34px;
    border-radius: 50% 50% 0 0 / 70% 70% 0 0;
    background: rgba(255,220,100,.85);
    box-shadow: 0 0 14px 3px rgba(255,220,100,.55);
    animation: winBlink 5s ease-in-out infinite;
}
.sil-win:nth-child(2) { animation-delay: -1.5s; }
.sil-win:nth-child(3) { animation-delay: -3s;   }

/* Door */
.sil-door {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 50px;
    border-radius: 50% 50% 0 0 / 30% 30% 0 0;
    background: #06080f;
    border: 2px solid #1a2a4a;
}

/* Ground strip */
.sil-ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: linear-gradient(180deg, #0d1525, #06080f);
    z-index: 1;
}

/* ===== LIGHT MODE ===== */
.light-mode {
    background: linear-gradient(180deg,
        #c9d9f0 0%,
        #ddeeff 45%,
        #eef6ff 75%,
        #fef9ec 100%
    );
}

.light-mode body::after {
    /* show sun instead of moon */
    background: radial-gradient(circle at 40% 35%, #fff9c4, #ffd600 55%, #ff8f00);
    box-shadow:
        0 0 30px 10px rgba(255,200,0,.45),
        0 0 80px 30px rgba(255,160,0,.2);
    width: 62px; height: 62px;
}

.light-mode body::before { opacity: 0; }

.light-mode .church-silhouette { filter: none; }
.light-mode .sil-steeple       { border-bottom-color: #b8c8e0; }
.light-mode .sil-tower-body    { background: #b8c8e0; }
.light-mode .sil-facade        { background: #c8d8ea; }
.light-mode .sil-roof          { border-bottom-color: #a0b4cc; }
.light-mode .sil-ground        { background: linear-gradient(180deg, #5a9a5a, #2d5a2d); }
.light-mode .sil-tower-win     { background: rgba(100,180,220,.8); box-shadow: 0 0 10px rgba(100,180,220,.5); animation: none; }
.light-mode .sil-win           { background: rgba(100,180,220,.8); box-shadow: 0 0 10px rgba(100,180,220,.5); animation: none; }
.light-mode .sil-rose          { border-color: #2563eb; background: rgba(100,160,255,.2); animation: none; }

.light-mode .login-card {
    background: rgba(255,255,255,.75);
    color: #0f172a;
    border: 1px solid rgba(255,255,255,.85);
    box-shadow:
        0 25px 60px rgba(0,60,120,.12),
        0 1px 0 rgba(255,255,255,.9) inset;
}

.light-mode .title p,
.light-mode .footer-text   { color: #64748b; }
.light-mode .form-label    { color: #1e3a5f; }

.light-mode .form-control {
    background: rgba(255,255,255,.8);
    color: #0f172a;
    border: 1px solid #c2d4e8;
}
.light-mode .form-control::placeholder { color: #94a3b8; }
.light-mode .form-control:focus {
    background: #fff;
    color: #0f172a;
    box-shadow: 0 0 0 3px rgba(37,99,235,.2);
    border-color: #2563eb;
}

.light-mode .theme-toggle button {
    background: rgba(255,255,255,.7);
    color: #0f172a;
    border: 1px solid #e2e8f0;
}

.light-mode .card-divider { background: linear-gradient(90deg, transparent, #2563eb55, transparent); }

/* ===== CARD ===== */
.login-card {
    width: 430px;
    padding: 38px 40px 32px;
    border-radius: 28px;
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    background: rgba(10,22,55,.55);
    border: 1px solid rgba(255,255,255,.13);
    box-shadow:
        0 30px 70px rgba(0,0,0,.45),
        0 1px 0 rgba(255,255,255,.08) inset,
        0 0 0 1px rgba(212,168,67,.07) inset;
    color: white;
    position: relative;
    z-index: 10;
    transition: background .5s, border .5s, box-shadow .5s, color .5s;
}

/* Subtle gold top-edge accent */
.login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,.7), transparent);
    border-radius: 0 0 2px 2px;
}

/* ===== THEME TOGGLE ===== */
.theme-toggle {
    display: flex;
    justify-content: left;
    margin-bottom: 14px;
}

.theme-toggle button {
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    background: rgba(255,255,255,.12);
    color: white;
    transition: .3s;
    border: 1px solid rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
}

.theme-toggle button:hover {
    transform: scale(1.1) rotate(15deg);
    background: rgba(212,168,67,.2);
    border-color: rgba(212,168,67,.5);
}

/* ===== LOGO ===== */
.logo {
    width: 88px;
    height: 88px;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    background: rgba(212,168,67,.12);
    font-size: 40px;
    margin-bottom: 18px;
    border: 1.5px solid rgba(212,168,67,.35);
    box-shadow:
        0 0 0 8px rgba(212,168,67,.06),
        0 10px 30px rgba(0,0,0,.3);
    position: relative;
}

/* Animated ring around logo */
.logo::after {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(212,168,67,.25);
    animation: logoRing 3s ease-in-out infinite;
}

@keyframes logoRing {
    0%, 100% { transform: scale(1);    opacity: .6; }
    50%       { transform: scale(1.06); opacity: 1;  }
}

/* ===== TITLE ===== */
.title {
    text-align: center;
    margin-bottom: 6px;
}

.title h2 {
    font-family: "Amiri", serif;
    font-weight: 700;
    font-size: 1.45rem;
    margin-bottom: 6px;
    letter-spacing: .01em;
}

.title p {
    color: rgba(255,255,255,.7);
    font-size: 13.5px;
    margin-bottom: 0;
}

/* Gold divider */
.card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,.5), transparent);
    margin: 18px 0 22px;
}

/* ===== FORM ===== */
.form-label {
    color: rgba(255,255,255,.85);
    font-weight: 600;
    font-size: 13.5px;
    margin-bottom: 6px;
}

.form-control {
    height: 50px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 13px;
    background: rgba(255,255,255,.09);
    color: white;
    padding-right: 15px;
    transition: background .3s, border .3s, box-shadow .3s;
    font-size: 14px;
}

.form-control::placeholder { color: rgba(255,255,255,.45); }

.form-control:focus {
    background: rgba(255,255,255,.16);
    color: white;
    box-shadow: 0 0 0 3px rgba(212,168,67,.28);
    border-color: rgba(212,168,67,.5);
    outline: none;
}

/* ===== LOGIN BUTTON ===== */
.btn-login {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    background: linear-gradient(135deg, #d4a843 0%, #f0cd7a 50%, #c88a20 100%);
    color: #1a0f00 !important;
    position: relative;
    overflow: hidden;
    transition: transform .25s, box-shadow .25s;
    box-shadow: 0 6px 28px rgba(212,168,67,.4);
    letter-spacing: .03em;
}

.btn-login::after {
    content: "";
    position: absolute;
    top: -50%; left: -65%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,.3);
    transform: skewX(-20deg);
    transition: left .5s;
}

.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(212,168,67,.55);
}

.btn-login:hover::after { left: 140%; }

.btn-login:active { transform: translateY(0) scale(.98); }

/* ===== FOOTER ===== */
.footer-text {
    text-align: center;
    margin-top: 18px;
    color: rgba(255,255,255,.45);
    font-size: 12px;
    letter-spacing: .04em;
}

</style>

</head>

<body>

<!-- Church silhouette (background decoration) -->
<div class="church-silhouette">
    <div class="sil-tower">
        <div class="sil-cross"></div>
        <div class="sil-steeple"></div>
        <div class="sil-tower-body">
            <div class="sil-tower-win delay1"></div>
        </div>
    </div>

    <div class="sil-body">
        <div class="sil-roof"></div>
        <div class="sil-facade">
            <div class="sil-rose"></div>
            <div class="sil-wins">
                <div class="sil-win"></div>
                <div class="sil-win"></div>
                <div class="sil-win"></div>
            </div>
            <div class="sil-door"></div>
        </div>
    </div>

    <div class="sil-tower">
        <div class="sil-cross"></div>
        <div class="sil-steeple"></div>
        <div class="sil-tower-body">
            <div class="sil-tower-win delay2"></div>
        </div>
    </div>
</div>

<div class="sil-ground"></div>

<!-- Login Card -->
<div class="login-card">

    <div class="theme-toggle">
        <button id="themeBtn" type="button">🌙</button>
    </div>

    <div class="logo">⛪</div>

    <div class="title">
        <h2>Church Attendance System</h2>
        <p>تسجيل الدخول إلى لوحة التحكم</p>
    </div>

    <div class="card-divider"></div>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">اسم المستخدم</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="أدخل اسم المستخدم"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">كلمة المرور</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="أدخل كلمة المرور"
                required>
        </div>

        <button type="submit" class="btn btn-login">
            تسجيل الدخول
        </button>

    </form>

    <div class="footer-text">
        © Church Attendance Management
    </div>

</div>

<script>

const btn = document.getElementById("themeBtn");

btn.onclick = () => {

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){

        btn.innerHTML = "☀️";

        localStorage.setItem("theme","light");

    }else{

        btn.innerHTML = "🌙";

        localStorage.setItem("theme","dark");
    }
};

if(localStorage.getItem("theme") === "light"){

    document.body.classList.add("light-mode");

    btn.innerHTML = "☀️";
}

</script>
</body>
</html>
